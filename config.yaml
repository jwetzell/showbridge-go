api:
  enabled: true
  port: 8080
modules:
  - id: http
    type: http.server
    params:
      port: 3000
  - id: udp
    type: net.udp.client
    params:
      host: 127.0.0.1
      port: 8000
routes:
  - input: http
    processors:
      - type: osc.message.create
        params:
          address: "{{.Payload.URL.Path}}"
      - type: osc.message.encode
      - type: router.output
        params:
          module: udp
